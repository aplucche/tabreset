<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabReset</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <h1>TabReset</h1>
        <p class="description">Summarize and close your open tabs.</p>

        <div id="status-container" class="status-box">
            <div id="status-text">Initializing...</div>
            <div id="progress-bar-container" class="hidden">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div id="file-section" class="file-box">
            <div class="file-label">Log file</div>
            <div id="file-status" class="file-none">No file selected</div>
            <div id="file-path" class="file-path hidden"></div>
            <div class="file-actions">
                <button id="open-file-btn" class="btn secondary small">Open Existing</button>
                <button id="new-file-btn" class="btn secondary small">Create New</button>
                <button id="change-file-btn" class="btn secondary small hidden">Change</button>
            </div>
        </div>

        <div class="actions">
            <button id="run-btn" class="btn primary" disabled>Summarize & Reset</button>
        </div>

        <div id="log" class="log-area"></div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
