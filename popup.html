<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabReset</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <h1>TabReset</h1>
        <p class="description">Summarize and close your open tabs.</p>

        <div id="status-container" class="status-box">
            <div id="status-text">Initializing...</div>
            <div id="progress-bar-container" class="hidden">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="actions">
            <button id="select-file-btn" class="btn secondary">Select/Create File</button>
            <button id="run-btn" class="btn primary" disabled>Summarize & Reset</button>
        </div>

        <div id="log" class="log-area"></div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
